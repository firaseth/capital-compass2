    <style>
        :root {
            --bg-primary: #0B1222;
            --bg-sidebar: #040812;
            --bg-card: #081a1a;
            --bg-accent-low: rgba(212, 175, 55, 0.1);
        }

        body.midnight {
            --bg-primary: #020617;
            --bg-sidebar: #000000;
            --bg-card: #0f172a;
            --bg-accent-low: rgba(30, 64, 175, 0.15);
        }

        .font-mono, code, .tabular-nums {
            font-family: 'JetBrains Mono', ui-monospace, monospace;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-primary);
            color: #E2E8F0;
            transition: background-color 0.5s ease;
        }

        /* Thematic Overrides */
        .midnight .bg-\[\#0B1222\], 
        .midnight .bg-\[\#061616\] { background-color: var(--bg-primary) !important; }
        .midnight .bg-\[\#040812\] { background-color: var(--bg-sidebar) !important; }
        .midnight .bg-\[\#081a1a\],
        .midnight .bg-\[\#0b2222\] { background-color: var(--bg-card) !important; }

        .gold-glow {
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.25);
        }
        .midnight .gold-glow {
            box-shadow: 0 0 25px rgba(30, 64, 175, 0.2);
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #D4AF37;
            border-radius: 10px;
        }
        .logo-gradient {
            background: radial-gradient(circle at center, rgba(30, 64, 175, 0.1) 0%, transparent 70%);
        }

        /* Custom range slider */
        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            background: transparent;
            cursor: pointer;
            width: 100%;
            height: 8px;
        }
        input[type="range"]::-webkit-slider-runnable-track {
            background: transparent;
            height: 8px;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            height: 18px;
            width: 18px;
            border-radius: 50%;
            background: #D4AF37;
            margin-top: -5px;
            box-shadow: 0 0 8px rgba(212, 175, 55, 0.6);
            border: 2px solid #0a1222;
            transition: box-shadow 0.2s;
        }
        input[type="range"]::-webkit-slider-thumb:hover {
            box-shadow: 0 0 14px rgba(212, 175, 55, 0.9);
        }
        input[type="range"]::-moz-range-thumb {
            height: 18px;
            width: 18px;
            border-radius: 50%;
            background: #D4AF37;
            box-shadow: 0 0 8px rgba(212, 175, 55, 0.6);
            border: 2px solid #0a1222;
            cursor: pointer;
        }
